<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endless Runner Bola Sepak</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0b5d1e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    .game-wrap {
      width: 420px;
      max-width: 96vw;
      text-align: center;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
      font-weight: bold;
      font-size: 14px;
    }

    .hud div {
      background: rgba(0, 0, 0, 0.35);
      padding: 8px 10px;
      border-radius: 10px;
      flex: 1;
    }

    canvas {
      width: 100%;
      height: auto;
      background: linear-gradient(#2bb34a, #117828);
      border: 5px solid white;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      display: block;
    }

    .controls {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: bold;
      cursor: pointer;
      background: white;
      color: #0b5d1e;
      box-shadow: 0 6px 14px rgba(0,0,0,0.2);
    }

    button:active {
      transform: scale(0.96);
    }

    .info {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="hud">
      <div>Skor: <span id="score">0</span></div>
      <div>Jarak: <span id="distance">0</span>m</div>
      <div>Level: <span id="level">1</span></div>
    </div>

    <canvas id="game" width="420" height="640"></canvas>

    <div class="controls">
      <button onclick="moveLeft()">⬅ Kiri</button>
      <button onclick="restartGame()">Restart</button>
      <button onclick="moveRight()">Kanan ➡</button>
    </div>

    <div class="info">Keyboard: ← / → untuk pindah jalur, Spasi untuk restart.</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const distanceEl = document.getElementById("distance");
    const levelEl = document.getElementById("level");

    const W = canvas.width;
    const H = canvas.height;
    const lanes = [W * 0.2, W * 0.5, W * 0.8];

    let player;
    let items;
    let particles;
    let score;
    let distance;
    let level;
    let speed;
    let spawnTimer;
    let gameOver;
    let frame;

    function resetState() {
      player = {
        lane: 1,
        x: lanes[1],
        y: H - 92,
        radius: 22
      };

      items = [];
      particles = [];
      score = 0;
      distance = 0;
      level = 1;
      speed = 4;
      spawnTimer = 0;
      gameOver = false;
      frame = 0;

      updateHUD();
    }

    function updateHUD() {
      scoreEl.textContent = score;
      distanceEl.textContent = Math.floor(distance);
      levelEl.textContent = level;
    }

    function moveLeft() {
      if (gameOver) return;
      if (player.lane > 0) player.lane--;
    }

    function moveRight() {
      if (gameOver) return;
      if (player.lane < 2) player.lane++;
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") moveLeft();
      if (e.key === "ArrowRight") moveRight();
      if (e.code === "Space" && gameOver) restartGame();
    });

    function restartGame() {
      resetState();
    }

    function randomLane() {
      return Math.floor(Math.random() * 3);
    }

    function spawnItem() {
      const lane = randomLane();
      const roll = Math.random();

      let type;
      if (roll < 0.42) type = "point";
      else if (roll < 0.72) type = "defender";
      else if (roll < 0.87) type = "cone";
      else type = "tackle";

      items.push({
        type,
        lane,
        x: lanes[lane],
        y: -50,
        size: type === "point" ? 16 : 26,
        value: type === "point" ? 10 + level * 2 : 0
      });
    }

    function drawField() {
      ctx.fillStyle = "#188c32";
      ctx.fillRect(0, 0, W, H);

      for (let i = 0; i < 12; i++) {
        ctx.fillStyle = i % 2 === 0 ? "rgba(255,255,255,0.04)" : "rgba(0,0,0,0.04)";
        ctx.fillRect(0, i * 60 - (frame * speed) % 60, W, 60);
      }

      ctx.strokeStyle = "rgba(255,255,255,0.55)";
      ctx.lineWidth = 3;
      ctx.setLineDash([18, 18]);

      ctx.beginPath();
      ctx.moveTo(W / 3, 0);
      ctx.lineTo(W / 3, H);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo((W / 3) * 2, 0);
      ctx.lineTo((W / 3) * 2, H);
      ctx.stroke();

      ctx.setLineDash([]);

      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(W / 2, H / 2, 70, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawPlayer() {
      player.x += (lanes[player.lane] - player.x) * 0.22;

      ctx.fillStyle = "#1565c0";
      ctx.beginPath();
      ctx.arc(player.x, player.y - 18, 15, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#0d47a1";
      ctx.fillRect(player.x - 17, player.y - 6, 34, 36);

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(player.x, player.y + 42, 13, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#111";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(player.x, player.y + 42, 13, 0, Math.PI * 2);
      ctx.moveTo(player.x - 10, player.y + 38);
      ctx.lineTo(player.x + 10, player.y + 46);
      ctx.moveTo(player.x + 8, player.y + 35);
      ctx.lineTo(player.x - 6, player.y + 50);
      ctx.stroke();
    }

    function drawItem(item) {
      const x = item.x;
      const y = item.y;

      if (item.type === "point") {
        ctx.fillStyle = "#ffd700";
        ctx.beginPath();
        ctx.arc(x, y, item.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#7a5600";
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";
        ctx.fillText("+", x, y + 5);
      }

      if (item.type === "defender") {
        ctx.fillStyle = "#c62828";
        ctx.beginPath();
        ctx.arc(x, y - 16, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(x - 18, y - 4, 36, 38);
        ctx.fillStyle = "white";
        ctx.font = "bold 13px Arial";
        ctx.textAlign = "center";
        ctx.fillText("X", x, y + 20);
      }

      if (item.type === "cone") {
        ctx.fillStyle = "#ff9800";
        ctx.beginPath();
        ctx.moveTo(x, y - 25);
        ctx.lineTo(x - 25, y + 25);
        ctx.lineTo(x + 25, y + 25);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = "white";
        ctx.fillRect(x - 16, y + 5, 32, 6);
      }

      if (item.type === "tackle") {
        ctx.fillStyle = "#4e342e";
        ctx.fillRect(x - 35, y - 12, 70, 24);
        ctx.fillStyle = "#ffeb3b";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText("SLIDE", x, y + 4);
      }
    }

    function createParticles(x, y) {
      for (let i = 0; i < 8; i++) {
        particles.push({
          x,
          y,
          vx: (Math.random() - 0.5) * 4,
          vy: (Math.random() - 0.5) * 4,
          life: 25
        });
      }
    }

    function drawParticles() {
      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        ctx.fillStyle = `rgba(255, 215, 0, ${p.life / 25})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });

      particles = particles.filter(p => p.life > 0);
    }

    function isColliding(item) {
      const dx = player.x - item.x;
      const dy = player.y - item.y;
      const distanceHit = Math.sqrt(dx * dx + dy * dy);
      return distanceHit < player.radius + item.size;
    }

    function updateItems() {
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += speed;

        if (isColliding(item)) {
          if (item.type === "point") {
            score += item.value;
            createParticles(item.x, item.y);
            items.splice(i, 1);
          } else {
            gameOver = true;
          }
        } else if (item.y > H + 70) {
          items.splice(i, 1);
        }
      }
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0,0,0,0.72)";
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "bold 38px Arial";
      ctx.fillText("GAME OVER", W / 2, H / 2 - 55);

      ctx.font = "bold 20px Arial";
      ctx.fillText(`Skor Akhir: ${score}`, W / 2, H / 2 - 15);
      ctx.fillText(`Jarak: ${Math.floor(distance)}m`, W / 2, H / 2 + 18);

      ctx.font = "16px Arial";
      ctx.fillText("Tekan Spasi atau tombol Restart", W / 2, H / 2 + 62);
    }

    function gameLoop() {
      frame++;

      drawField();

      if (!gameOver) {
        distance += speed * 0.06;
        level = Math.floor(distance / 120) + 1;
        speed = 4 + level * 0.45;

        spawnTimer--;
        if (spawnTimer <= 0) {
          spawnItem();
          spawnTimer = Math.max(22, 70 - level * 4);
        }

        updateItems();
        updateHUD();
      }

      items.forEach(drawItem);
      drawParticles();
      drawPlayer();

      if (gameOver) drawGameOver();

      requestAnimationFrame(gameLoop);
    }

    resetState();
    gameLoop();
  </script>
</body>
</html>
